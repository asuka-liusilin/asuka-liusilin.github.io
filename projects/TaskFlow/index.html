<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - AI任务管理系统</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%23667eea;stop-opacity:1'/><stop offset='100%' style='stop-color:%23764ba2;stop-opacity:1'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23grad)'/><text x='50' y='65' font-size='40' text-anchor='middle' fill='white'>T</text></svg>" type="image/svg+xml">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <span class="logo-text">TaskFlow</span>
      </div>

      <nav class="nav-menu">
        <button class="nav-item active" data-filter="all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="9" y1="9" x2="15" y2="9"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <span>全部任务</span>
          <span class="nav-count" id="allCount">0</span>
        </button>

        <button class="nav-item" data-filter="today">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span>今日任务</span>
          <span class="nav-count" id="todayCount">0</span>
        </button>

        <button class="nav-item" data-filter="completed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span>已完成</span>
          <span class="nav-count" id="completedCount">0</span>
        </button>

        <button class="nav-item" data-filter="favorite">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <span>收藏任务</span>
          <span class="nav-count" id="favoriteCount">0</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="ai-toggle" id="aiSplitBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" placeholder="搜索任务...">
        </div>

        <div class="btn-group">
          <button class="ai-btn" id="aiSplitBtnAlt">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
            <span>AI 拆分任务</span>
          </button>
          <button class="add-btn" id="addBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span>添加任务</span>
          </button>
        </div>
      </header>

      <div class="task-stats">
        <div class="stat-item">
          <span class="stat-value" id="totalTasks">0</span>
          <span class="stat-label">总任务</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="todayTasks">0</span>
          <span class="stat-label">今日待办</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="completedTasks">0</span>
          <span class="stat-label">已完成</span>
        </div>
        <div class="stat-item rate">
          <span class="stat-value" id="completionRate">0%</span>
          <span class="stat-label">完成率</span>
        </div>
      </div>

      <div class="task-filters">
        <button class="filter-btn active" data-category="all">全部</button>
        <button class="filter-btn" data-category="工作">工作</button>
        <button class="filter-btn" data-category="个人">个人</button>
        <button class="filter-btn" data-category="学习">学习</button>
        <button class="filter-btn" data-category="其他">其他</button>
      </div>

      <div class="task-list" id="taskList">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <h3>暂无任务</h3>
          <p>点击右上角按钮添加你的第一个任务</p>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">添加任务</h2>
        <button class="close-btn" id="closeBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <form id="taskForm">
        <div class="form-group">
          <label>任务标题</label>
          <input type="text" id="taskTitle" placeholder="输入任务标题..." required>
        </div>

        <div class="form-group">
          <label>任务描述</label>
          <textarea id="taskDescription" placeholder="输入任务描述..." rows="3"></textarea>
        </div>

        <div class="form-group">
          <label>分类</label>
          <select id="taskCategory">
            <option value="工作">工作</option>
            <option value="个人">个人</option>
            <option value="学习">学习</option>
            <option value="其他">其他</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" id="cancelBtn">取消</button>
          <button type="submit" class="btn-submit">保存任务</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="aiSplitModal">
    <div class="ai-modal-content">
      <div class="ai-modal-header">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          AI 智能任务拆分
        </h2>
        <button class="ai-close-btn" id="aiCloseBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div id="aiForm">
        <div class="ai-input-group">
          <input type="text" id="aiTaskInput" placeholder="输入复杂任务，如：准备期末考试、开发网站、健身计划...">
          <button class="ai-submit-btn" id="aiSubmitBtn">智能拆分</button>
        </div>
        <div id="aiResult"></div>
      </div>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="ui.js"></script>
  <script src="ai.js"></script>
  <script src="app.js"></script>
</body>
</html>
