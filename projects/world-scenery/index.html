<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界风景图鉴</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%23667eea;stop-opacity:1'/><stop offset='100%' style='stop-color:%23764ba2;stop-opacity:1'/></linearGradient></defs><circle cx='50' cy='50' r='40' fill='url(%23grad)'/><path d='M50 20L65 35L50 50L35 35Z' fill='white'/></svg>" type="image/svg+xml">
</head>
<body>

<header>
  <h1>🌍 世界风景图鉴</h1>
  <p>探索全球最美风景</p>
</header>

<section class="search-box">
  <input type="text" id="searchInput" placeholder="搜索国家或景点...">
</section>

<div class="filters">
  <button onclick="filterCategory('全部')">全部</button>
  <button onclick="filterCategory('欧洲')">欧洲</button>
  <button onclick="filterCategory('亚洲')">亚洲</button>
  <button onclick="filterCategory('海岛')">海岛</button>
  <button onclick="filterCategory('雪山')">雪山</button>
  <button onclick="filterCategory('美洲')">美洲</button>
  <span class="favorite-badge" onclick="showFavorites()">💝 我的收藏 (<span id="favoriteCount">0</span>)</span>
</div>

<section class="card-container" id="cards"></section>

<footer>
  <p><a href="index.html">返回首页</a> | <a href="../index.html">回到作品集</a></p>
  <p style="margin-top: 15px;">© 2026 世界风景图鉴</p>
</footer>

<script src="app.js"></script>
</body>
</html>
