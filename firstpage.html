<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        p {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 30px;
            opacity: 0.95;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }
        .projects {
            margin-top: 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .project-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 30px 20px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .project-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
        }
        .project-card h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        .project-card p {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>你好，这是我的 GitHub Pages 作品集</h1>
        <p>正在搭建个人作品集网站，后续将上线「世界风景图鉴」3D交互项目，敬请期待✨</p >
        <a href=" " class="btn">查看我的项目</a >

        <div class="projects" id="projects">
            <div class="project-card">
                <h3>世界风景图鉴</h3>
                <p>3D可交互地球，探索全球著名景点，鼠标悬浮看实景，点击查看详情</p >
                <a href="#" class="btn" style="padding: 10px 25px; font-size: 0.9rem;">开发中</a >
            </div>
            <div class="project-card">
                <h3>待办清单APP</h3>
                <p>本地存储待办事项，支持添加、删除、标记完成，简约美观</p >
                <a href="#" class="btn" style="padding: 10px 25px; font-size: 0.9rem;">即将上线</a >
            </div>
            <div class="project-card">
                <h3>个人博客</h3>
                <p>记录学习与生活，分享前端开发、AI工具使用经验</p >
                <a href="#" class="btn" style="padding: 10px 25px; font-size: 0.9rem;">规划中</a >
            </div>
        </div>
    </div>
</body>
</html>
